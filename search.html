<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Smart Search</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#191c1d] min-h-screen pb-24">
    <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#033568] text-white shadow-lg">
        <a href="index.html" class="text-white"><span class="material-symbols-outlined">arrow_forward</span></a>
        <span class="text-lg font-bold">BUILD UP ACADEMY</span>
        <button onclick="toggleLangSearch()" class="border border-white/20 px-2 py-1 rounded text-sm">HE/EN</button>
    </header>

    <main class="pt-24 px-6 max-w-4xl mx-auto">
        <header class="mb-10 text-right">
            <h1 class="text-4xl font-extrabold text-[#033568] mb-2">חיפוש חכם</h1>
            <p class="text-slate-500">הקלד מונח ולחץ Enter (למשל: מטבח, חלונות, ריצוף)</p>
        </header>

        <section class="mb-12">
            <input id="search-input" class="w-full bg-white h-20 pr-6 pl-6 text-xl border-none rounded-xl shadow-md focus:ring-2 focus:ring-[#033568]/20 transition-all" placeholder="חיפוש..." type="text">
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold text-[#033568] mb-6">מונחים פופולריים</h2>
                <div class="flex flex-wrap gap-3">
                    <a href="cabinets.html" class="px-4 py-2 bg-slate-100 rounded-full text-sm font-semibold">Kitchens / מטבחים</a>
                    <a href="windows.html" class="px-4 py-2 bg-slate-100 rounded-full text-sm font-semibold">Windows / חלונות</a>
                    <a href="flooring.html" class="px-4 py-2 bg-slate-100 rounded-full text-sm font-semibold">Flooring / ריצוף</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('search-input');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = input.value.toLowerCase();
                if (val.includes('מטבח') || val.includes('kitchen')) window.location.href = 'cabinets.html';
                else if (val.includes('חלון') || val.includes('window')) window.location.href = 'windows.html';
                else if (val.includes('ריצוף') || val.includes('floor')) window.location.href = 'flooring.html';
                else if (val.includes('יסוד') || val.includes('found')) window.location.href = 'foundation.html';
                else if (val.includes('רחצה') || val.includes('bath')) window.location.href = 'bathrooms.html';
                else alert('לא נמצאו תוצאות / No results found');
            }
        });

        function toggleLangSearch() {
            const html = document.documentElement;
            html.dir = (html.dir === "rtl") ? "ltr" : "rtl";
        }
    </script>
</body>
</html>
