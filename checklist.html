<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Build Up Academy - Checklist</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#033568",
              "secondary": "#775a19",
              "surface": "#f8f9fa",
              "on-surface": "#191c1d",
              "primary-container": "#254c80",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24">
    <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#033568] text-white">
        <div class="flex items-center gap-4">
            <span class="text-lg font-black tracking-widest font-manrope uppercase">BUILD UP ACADEMY</span>
        </div>
        <div class="text-white font-bold text-sm">HE/EN</div>
    </header>

    <main class="pt-20 px-6 max-w-4xl mx-auto">
        <section class="mb-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <span class="bg-blue-100 text-blue-900 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest mb-2 inline-block">Academy Professional Tool</span>
                    <h1 class="text-4xl font-extrabold tracking-tight text-primary leading-tight">רשימת בדיקה <br/>לפני הצעת מחיר</h1>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="md:col-span-7 space-y-6">
                <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="material-symbols-outlined text-primary bg-blue-50 p-2 rounded-lg">countertops</span>
                        <h2 class="text-xl font-bold text-primary">מטבח</h2>
                    </div>
                    <div class="space-y-3">
                        <label class="flex items-center justify-between p-4 bg-slate-50 hover:bg-white transition-all rounded-lg cursor-pointer border border-transparent hover:border-slate-200">
                            <div class="flex items-center gap-4">
                                <input class="w-6 h-6 border-slate-300 text-primary rounded focus:ring-primary" type="checkbox">
                                <span class="text-on-surface font-medium text-sm">Verify drain size (2")</span>
                            </div>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-slate-50 hover:bg-white transition-all rounded-lg cursor-pointer border border-transparent hover:border-slate-200">
                            <div class="flex items-center gap-4">
                                <input class="w-6 h-6 border-slate-300 text-primary rounded focus:ring-primary" type="checkbox">
                                <span class="text-on-surface font-medium text-sm">מרחק קו גז</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="bg-amber-900 text-white rounded-xl p-6 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-2 text-amber-400">
                            <span class="material-symbols-outlined">lightbulb</span>
                            <span class="text-xs font-bold uppercase tracking-widest">Academy Tip</span>
                        </div>
                        <p class="text-sm leading-relaxed opacity-90">ודא תמיד שיש גישה נוחה לקווי המים והניקוז לפני תחילת העבודה.</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-5 space-y-6">
                <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="material-symbols-outlined text-primary bg-blue-50 p-2 rounded-lg">bathtub</span>
                        <h2 class="text-xl font-bold text-primary">אמבטיה</h2>
                    </div>
                    <label class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-transparent">
                        <div class="flex items-center gap-4">
                            <input class="w-6 h-6 border-slate-300 text-primary rounded focus:ring-primary" type="checkbox">
                            <span class="text-on-surface font-medium text-sm">איטום רצפה</span>
                        </div>
                    </label>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-sm border-r-4 border-primary">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="material-symbols-outlined text-primary bg-blue-50 p-2 rounded-lg">foundation</span>
                        <h2 class="text-xl font-bold text-primary">מבנה</h2>
                    </div>
                    <div class="space-y-3">
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                            <div class="flex items-center gap-4">
                                <input class="w-6 h-6 border-slate-300 text-primary rounded focus:ring-primary" type="checkbox">
                                <span class="text-on-surface font-medium text-sm">Check for wood rot</span>
                            </div>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                            <div class="flex items-center gap-4">
                                <input class="w-6 h-6 border-slate-300 text-primary rounded focus:ring-primary" type="checkbox">
                                <span class="text-on-surface font-medium text-sm">Permit needed?</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.05)] border-t border-slate-100 z-50">
        <a href="index.html" class="flex flex-col items-center justify-center gap-1 group">
            <div class="p-1 text-slate-400 hover:text-[#775a19]"><span class="material-symbols-outlined text-[28px]">school</span></div>
            <span class="text-[10px] font-medium font-label text-slate-500 tracking-tight">אקדמיה</span>
        </a>
        <a href="search.html" class="flex flex-col items-center justify-center gap-1 group">
            <div class="p-1 text-slate-400 hover:text-[#775a19]"><span class="material-symbols-outlined text-[28px]">search</span></div>
            <span class="text-[10px] font-medium font-label text-slate-500 tracking-tight">חיפוש</span>
        </a>
        <a href="checklist.html" class="flex flex-col items-center justify-center gap-1 group">
            <div class="p-1 text-[#775a19]"><span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">fact_check</span></div>
            <span class="text-[10px] font-bold font-label text-[#775a19] tracking-tight">צ'ק-ליסט</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center gap-1 group">
            <div class="p-1 text-slate-400 hover:text-[#775a19]"><span class="material-symbols-outlined text-[28px]">person</span></div>
            <span class="text-[10px] font-medium font-label text-slate-500 tracking-tight">פרופיל</span>
        </a>
    </nav>
</body>
</html>
